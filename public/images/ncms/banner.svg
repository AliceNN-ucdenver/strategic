  <text x="600" y="408" text-anchor="middle" fill="#6a6a8a" font-size="10" font-weight="500" letter-spacing="3">ZERO VECTOR DBS  &#x2022;  ZERO EMBEDDING APIs  &#x2022;  KERNEL-ISOLATED SANDBOXES  &#x2022;  FULL LLM OBSERVABILITY  &#x2022;  BUILT IN &lt;2 WEEKS</text>
