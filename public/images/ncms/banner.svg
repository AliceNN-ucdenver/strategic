  <g transform="translate(150, 260)">
    <!-- Archeologist (dual-path: research + archaeology) -->
    <circle cx="0" cy="0" r="22" fill="#0a1a10" stroke="#10b981" stroke-width="2" filter="url(#glow)"/>
