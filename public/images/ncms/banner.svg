    <polygon points="375,-40 385,-34 377,-31" fill="#ff9800" opacity="0.5"/>

    <!-- Designer to Security -->
    <line x1="265" y1="10" x2="380" y2="36" stroke="#ff9800" stroke-width="1.2" opacity="0.35" stroke-dasharray="5,4"/>
    <polygon points="375,31 385,34 377,40" fill="#ff9800" opacity="0.5"/>

    <!-- Architect -->
