    <text x="410" y="-37" text-anchor="middle" fill="#448aff" font-size="9" font-weight="700">ARC</text>
    <text x="410" y="-2" text-anchor="middle" fill="#6a8aba" font-size="8">Architect</text>

    <!-- Security -->
