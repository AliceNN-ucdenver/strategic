    <text x="240" y="2" text-anchor="middle" fill="#ff9800" font-size="9" font-weight="700">DSN</text>
    <text x="240" y="36" text-anchor="middle" fill="#aa8a4a" font-size="8">Design</text>

    <!-- PARALLEL label -->
    <text x="340" y="-2" text-anchor="middle" fill="#ffffff" font-size="7" font-weight="600" letter-spacing="2" opacity="0.4">PARALLEL</text>

    <!-- Designer to Architect -->
