    <text x="410" y="39" text-anchor="middle" fill="#ff4081" font-size="9" font-weight="700">SEC</text>
    <text x="410" y="72" text-anchor="middle" fill="#ba6a7a" font-size="8">Security</text>

    <!-- Return arrows to Design Doc -->
    <line x1="435" y1="-24" x2="510" y2="0" stroke="#448aff" stroke-width="1" opacity="0.3"/>
    <line x1="435" y1="24" x2="510" y2="0" stroke="#ff4081" stroke-width="1" opacity="0.3"/>

