  <!-- Three key phrases -->
  <text x="600" y="145" text-anchor="middle" fill="#b0b0cc" font-size="13" font-weight="400" letter-spacing="0.5">Five AI agents research, analyze codebases, consult experts, and produce implementation designs autonomously.</text>
  <text x="600" y="166" text-anchor="middle" fill="#c0c0dd" font-size="12" font-weight="500" letter-spacing="1.5">Semi-formal certificates + CoT (+29% traceability)  |  Tavily + ArXiv  |  Memory that actually works.</text>

