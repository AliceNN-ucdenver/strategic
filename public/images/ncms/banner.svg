    <text x="0" y="68" fill="#448aff" font-size="28" font-weight="700" filter="url(#textglow)">6.3x</text>
    <text x="82" y="60" fill="#6a8aba" font-size="10">vs Mem0</text>
    <text x="82" y="72" fill="#4a6a8a" font-size="9">temporal reasoning</text>

    <text x="0" y="106" fill="#ff9800" font-size="28" font-weight="700" filter="url(#textglow)">2.8x</text>
    <text x="82" y="98" fill="#aa8a4a" font-size="10">vs Letta</text>
    <text x="82" y="110" fill="#8a6a3a" font-size="9">cross-document</text>

    <text x="0" y="144" fill="#7c4dff" font-size="28" font-weight="700" filter="url(#textglow)">3B</text>
