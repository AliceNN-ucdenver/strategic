  <!-- Right side: Key metrics -->
  <g transform="translate(985, 55)">
    <text x="80" y="0" text-anchor="middle" fill="#8080aa" font-size="10" font-weight="600" letter-spacing="3">BENCHMARKS</text>

    <text x="0" y="30" fill="#00ff88" font-size="28" font-weight="700" filter="url(#textglow)">0.72</text>
    <text x="78" y="22" fill="#7aaa8a" font-size="10">nDCG@10</text>
