    <circle cx="680" cy="55" r="1.8"/><circle cx="830" cy="85" r="1"/>
    <circle cx="960" cy="50" r="1.5"/><circle cx="1100" cy="70" r="1.2"/>
    <circle cx="150" cy="280" r="1"/><circle cx="440" cy="300" r="1.5"/>
    <circle cx="750" cy="290" r="1.2"/><circle cx="1050" cy="285" r="1.8"/>
