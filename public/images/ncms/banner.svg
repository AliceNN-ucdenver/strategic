    <text x="120" y="2" text-anchor="middle" fill="#00ff88" font-size="9" font-weight="700">PO</text>
    <text x="120" y="36" text-anchor="middle" fill="#7aaa8a" font-size="8">PRD</text>

    <!-- PO to Designer -->
