  <g opacity="0.12" fill="#00ff88" font-family="monospace" font-size="10">
    <text x="870" y="20">ﾊ ﾐ ﾋ ﾎ ﾍ</text>
    <text x="890" y="35">0 1 1 0</text>
    <text x="870" y="50">ﾏ ﾑ ﾒ ﾓ</text>
    <text x="895" y="65">1 0 0 1</text>
    <text x="875" y="80">ﾔ ﾕ ﾖ ﾗ</text>
    <text x="890" y="95">0 1 0 1</text>
    <text x="870" y="110">ﾘ ﾙ ﾚ ﾛ</text>
    <text x="895" y="125">1 1 0 0</text>
    <text x="875" y="140">ﾜ ﾝ ﾞ ﾟ</text>
    <text x="890" y="155">0 0 1 1</text>
    <text x="870" y="170">ﾊ ﾐ ﾋ ﾎ</text>
    <text x="895" y="185">1 0 1 0</text>
    <text x="875" y="200">ﾏ ﾑ ﾒ ﾓ</text>
    <text x="890" y="215">0 1 1 1</text>
    <text x="870" y="230">ﾔ ﾕ ﾖ ﾗ</text>
    <text x="895" y="245">1 1 0 1</text>
    <text x="875" y="260">ﾘ ﾙ ﾚ ﾛ</text>
    <text x="890" y="275">0 0 1 0</text>
    <text x="870" y="290">ﾜ ﾝ ﾞ ﾟ</text>
    <text x="895" y="305">1 0 0 0</text>
    <text x="875" y="320">ﾊ ﾐ ﾋ ﾎ</text>
  </g>
  <g opacity="0.07" fill="#00ff88" font-family="monospace" font-size="10">
    <text x="935" y="15">ｱ ｲ ｳ</text>
    <text x="940" y="30">1 0 1</text>
    <text x="935" y="45">ｴ ｵ ｶ</text>
    <text x="940" y="60">0 1 0</text>
    <text x="935" y="75">ｷ ｸ ｹ</text>
    <text x="940" y="90">1 1 1</text>
    <text x="935" y="105">ｺ ｻ ｼ</text>
    <text x="940" y="120">0 0 0</text>
    <text x="935" y="135">ｽ ｾ ｿ</text>
    <text x="940" y="150">1 0 0</text>
    <text x="935" y="165">ﾀ ﾁ ﾂ</text>
    <text x="940" y="180">0 1 1</text>
