<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0f1629"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#162032"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e2e"/>
      <stop offset="100%" stop-color="#141828"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="shadowSm" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="600" rx="10" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="500" y="24" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700" letter-spacing="1">Architecture Context</text>
  <text x="500" y="39" text-anchor="middle" fill="#64748b" font-size="9">NCMS + NeMo Agent Toolkit + NemoClaw</text>

  <!-- ================================================================ -->
  <!-- TIER 1: NemoClaw Sandboxes (y=55..125)                           -->
  <!-- 6 boxes: centers at 110, 235, 360, 485, 610, 735                -->
  <!-- ================================================================ -->

  <!-- Archeologist (dual-path: research + archaeology) -->
  <g filter="url(#shadowSm)">
    <rect x="105" y="55" width="130" height="62" rx="7" fill="url(#boxGrad)" stroke="#10b981" stroke-width="1.2"/>
    <rect x="105" y="55" width="130" height="19" rx="7" fill="#10b981" opacity="0.2"/>
    <rect x="105" y="67" width="130" height="7" fill="#10b981" opacity="0.2"/>
    <text x="170" y="69" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600">Archeologist</text>
    <text x="170" y="87" text-anchor="middle" fill="#94a3b8" font-size="7">Dual-path :8005</text>
    <text x="170" y="101" text-anchor="middle" fill="#6b5b8e" font-size="6.5">Research + archaeology</text>
  </g>

  <!-- Product Owner -->
  <g filter="url(#shadowSm)">
    <rect x="255" y="55" width="130" height="62" rx="7" fill="url(#boxGrad)" stroke="#22c55e" stroke-width="1.2"/>
    <rect x="255" y="55" width="130" height="19" rx="7" fill="#22c55e" opacity="0.2"/>
    <rect x="255" y="67" width="130" height="7" fill="#22c55e" opacity="0.2"/>
    <text x="320" y="69" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="600">Product Owner</text>
    <text x="320" y="87" text-anchor="middle" fill="#94a3b8" font-size="7">CoT + tracing :8004</text>
    <text x="320" y="101" text-anchor="middle" fill="#6b5b8e" font-size="6.5">Semi-formal cert</text>
  </g>

  <!-- Designer -->
  <g filter="url(#shadowSm)">
    <rect x="405" y="55" width="130" height="62" rx="7" fill="url(#boxGrad)" stroke="#f59e0b" stroke-width="1.2"/>
    <rect x="405" y="55" width="130" height="19" rx="7" fill="#f59e0b" opacity="0.2"/>
    <rect x="405" y="67" width="130" height="7" fill="#f59e0b" opacity="0.2"/>
    <text x="470" y="69" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">Designer</text>
    <text x="470" y="87" text-anchor="middle" fill="#94a3b8" font-size="7">Standard RCTRO :8003</text>
    <text x="470" y="101" text-anchor="middle" fill="#6b5b8e" font-size="6.5">Review loop</text>
  </g>

  <!-- Architect -->
  <g filter="url(#shadowSm)">
    <rect x="555" y="55" width="130" height="62" rx="7" fill="url(#boxGrad)" stroke="#3b82f6" stroke-width="1.2"/>
    <rect x="555" y="55" width="130" height="19" rx="7" fill="#3b82f6" opacity="0.2"/>
    <rect x="555" y="67" width="130" height="7" fill="#3b82f6" opacity="0.2"/>
    <text x="620" y="69" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="600">Architect</text>
    <text x="620" y="87" text-anchor="middle" fill="#94a3b8" font-size="7">ADR + CALM :8001</text>
    <text x="620" y="101" text-anchor="middle" fill="#6b5b8e" font-size="6.5">Dual-mode review</text>
  </g>

  <!-- Security -->
  <g filter="url(#shadowSm)">
    <rect x="705" y="55" width="130" height="62" rx="7" fill="url(#boxGrad)" stroke="#ef4444" stroke-width="1.2"/>
    <rect x="705" y="55" width="130" height="19" rx="7" fill="#ef4444" opacity="0.2"/>
    <rect x="705" y="67" width="130" height="7" fill="#ef4444" opacity="0.2"/>
    <text x="770" y="69" text-anchor="middle" fill="#ef4444" font-size="9" font-weight="600">Security</text>
    <text x="770" y="87" text-anchor="middle" fill="#94a3b8" font-size="7">STRIDE + OWASP :8002</text>
    <text x="770" y="101" text-anchor="middle" fill="#6b5b8e" font-size="6.5">Dual-mode review</text>
  </g>

  <!-- Vertical lines from agents down to hub -->
  <line x1="170" y1="117" x2="170" y2="170" stroke="#10b981" stroke-width="1" opacity="0.45"/>
  <line x1="320" y1="117" x2="320" y2="170" stroke="#22c55e" stroke-width="1" opacity="0.45"/>
  <line x1="470" y1="117" x2="470" y2="170" stroke="#f59e0b" stroke-width="1" opacity="0.45"/>
  <line x1="620" y1="117" x2="620" y2="170" stroke="#3b82f6" stroke-width="1" opacity="0.45"/>
  <line x1="770" y1="117" x2="770" y2="170" stroke="#ef4444" stroke-width="1" opacity="0.45"/>

  <!-- :9080 labels -->
  <text x="180" y="148" fill="#64748b" font-size="6.5">:9080</text>
  <text x="330" y="148" fill="#64748b" font-size="6.5">:9080</text>
  <text x="480" y="148" fill="#64748b" font-size="6.5">:9080</text>
  <text x="630" y="148" fill="#64748b" font-size="6.5">:9080</text>
  <text x="780" y="148" fill="#64748b" font-size="6.5">:9080</text>

  <!-- ================================================================ -->
  <!-- TIER 2: NCMS Hub (y=170..400)                                    -->
  <!-- Hub: x=140..820                                                  -->
  <!-- ================================================================ -->
  <g filter="url(#shadow)">
    <rect x="140" y="170" width="680" height="230" rx="10" fill="url(#hubGrad)" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Header bar -->
    <rect x="140" y="170" width="680" height="28" rx="10" fill="#0ea5e9" opacity="0.12"/>
    <rect x="140" y="190" width="680" height="8" fill="#0ea5e9" opacity="0.12"/>
    <text x="480" y="188" text-anchor="middle" fill="#0ea5e9" font-size="13" font-weight="700" letter-spacing="0.5">NCMS Hub</text>
    <text x="795" y="187" text-anchor="end" fill="#475569" font-size="7.5">Docker :9080 | Dashboard :8420</text>
  </g>

  <!-- Hub components: Row 1 (2x3 grid, y=208) -->

  <!-- Memory Store -->
  <g filter="url(#shadowSm)">
    <rect x="160" y="208" width="200" height="78" rx="6" fill="#0f172a" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="260" y="226" text-anchor="middle" fill="#f59e0b" font-size="9" font-weight="600">Memory Store</text>
    <text x="260" y="241" text-anchor="middle" fill="#94a3b8" font-size="7.5">SQLite (WAL mode)</text>
    <text x="260" y="254" text-anchor="middle" fill="#94a3b8" font-size="7.5">Tantivy BM25 (Rust)</text>
    <text x="260" y="267" text-anchor="middle" fill="#94a3b8" font-size="7.5">SPLADE v3 sparse neural</text>
  </g>

  <!-- Knowledge Bus -->
  <g filter="url(#shadowSm)">
    <rect x="380" y="208" width="200" height="78" rx="6" fill="#0f172a" stroke="#0ea5e9" stroke-width="0.8"/>
    <text x="480" y="226" text-anchor="middle" fill="#0ea5e9" font-size="9" font-weight="600">Knowledge Bus</text>
    <text x="480" y="241" text-anchor="middle" fill="#94a3b8" font-size="7.5">AsyncIO in-process</text>
    <text x="480" y="254" text-anchor="middle" fill="#94a3b8" font-size="7.5">ask / announce / subscribe</text>
  </g>

  <!-- Knowledge Graph -->
  <g filter="url(#shadowSm)">
    <rect x="600" y="208" width="200" height="78" rx="6" fill="#0f172a" stroke="#a855f7" stroke-width="0.8"/>
    <text x="700" y="226" text-anchor="middle" fill="#a855f7" font-size="9" font-weight="600">Knowledge Graph</text>
    <text x="700" y="241" text-anchor="middle" fill="#94a3b8" font-size="7.5">NetworkX DiGraph</text>
    <text x="700" y="254" text-anchor="middle" fill="#94a3b8" font-size="7.5">Spreading activation</text>
  </g>

  <!-- Hub components: Row 2 (y=300) -->

  <!-- Dashboard -->
  <g filter="url(#shadowSm)">
    <rect x="160" y="300" width="200" height="78" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="0.8"/>
    <text x="260" y="318" text-anchor="middle" fill="#10b981" font-size="9" font-weight="600">Dashboard</text>
    <text x="260" y="333" text-anchor="middle" fill="#94a3b8" font-size="7.5">SSE event feeds</text>
    <text x="260" y="346" text-anchor="middle" fill="#94a3b8" font-size="7.5">REST API + agent chat</text>
  </g>

  <!-- Document Store -->
  <g filter="url(#shadowSm)">
    <rect x="380" y="300" width="200" height="78" rx="6" fill="#0f172a" stroke="#f97316" stroke-width="0.8"/>
    <text x="480" y="318" text-anchor="middle" fill="#f97316" font-size="9" font-weight="600">Document Store</text>
    <text x="480" y="333" text-anchor="middle" fill="#94a3b8" font-size="7.5">PRDs, designs, review reports</text>
    <text x="480" y="346" text-anchor="middle" fill="#94a3b8" font-size="7.5">Published via bus events</text>
  </g>

  <!-- ML Models -->
  <g filter="url(#shadowSm)">
    <rect x="600" y="300" width="200" height="78" rx="6" fill="#0f172a" stroke="#64748b" stroke-width="0.8"/>
    <text x="700" y="318" text-anchor="middle" fill="#cbd5e1" font-size="9" font-weight="600">ML Models</text>
    <text x="700" y="333" text-anchor="middle" fill="#94a3b8" font-size="7.5">GLiNER NER (209MB)</text>
    <text x="700" y="346" text-anchor="middle" fill="#94a3b8" font-size="7.5">Cross-encoder reranker</text>
  </g>

  <!-- ================================================================ -->
  <!-- LEFT: DGX Spark (x=10..130, y=190..340)                         -->
  <!-- Positioned fully LEFT of hub (hub starts at x=140)              -->
  <!-- ================================================================ -->
  <g filter="url(#shadow)">
    <rect x="10" y="190" width="118" height="150" rx="7" fill="url(#boxGrad)" stroke="#76b900" stroke-width="1.2"/>
    <rect x="10" y="190" width="118" height="20" rx="7" fill="#76b900" opacity="0.18"/>
    <rect x="10" y="203" width="118" height="7" fill="#76b900" opacity="0.18"/>
    <text x="69" y="205" text-anchor="middle" fill="#76b900" font-size="9.5" font-weight="700">DGX Spark</text>
    <text x="69" y="224" text-anchor="middle" fill="#94a3b8" font-size="7.5">vLLM server</text>
    <text x="69" y="240" text-anchor="middle" fill="#e2e8f0" font-size="8" font-weight="500">Nemotron Nano 30B</text>
    <text x="69" y="254" text-anchor="middle" fill="#e2e8f0" font-size="7.5">(3B active params)</text>
    <text x="69" y="272" text-anchor="middle" fill="#64748b" font-size="7">qwen3_coder parser</text>
    <text x="69" y="286" text-anchor="middle" fill="#64748b" font-size="7">512K ctx | 128GB</text>
    <text x="69" y="325" text-anchor="middle" fill="#76b900" font-size="8.5" font-weight="500">:8000</text>
  </g>

  <!-- Spark to Hub: horizontal arrow into hub left edge -->
  <line x1="128" y1="265" x2="138" y2="265" stroke="#76b900" stroke-width="1.5" opacity="0.7"/>
  <polygon points="136,261 142,265 136,269" fill="#76b900" opacity="0.7"/>
  <text x="115" y="256" fill="#76b900" font-size="6.5" font-weight="500" text-anchor="end">LLM</text>
  <text x="115" y="264" fill="#76b900" font-size="6.5" font-weight="500" text-anchor="end">inference</text>

  <!-- Note: LangGraph agents connect directly to Spark at :8000 (bypassing
       the NemoClaw inference.local proxy). This is a config-level detail
       — visually represented by the Spark→Hub arrow labeled "LLM inference". -->

  <!-- ================================================================ -->
  <!-- RIGHT: External Services (x=835..990, y=195..330)                -->
  <!-- Positioned fully RIGHT of hub (hub ends at x=820)               -->
  <!-- ================================================================ -->

  <!-- Tavily API -->
  <g filter="url(#shadowSm)">
    <rect x="845" y="195" width="140" height="58" rx="7" fill="url(#boxGrad)" stroke="#38bdf8" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="915" y="216" text-anchor="middle" fill="#38bdf8" font-size="9" font-weight="600">Tavily API</text>
    <text x="915" y="231" text-anchor="middle" fill="#94a3b8" font-size="7.5">Web search</text>
    <text x="915" y="244" text-anchor="middle" fill="#64748b" font-size="7">Archeologist + PO</text>
  </g>

  <!-- Phoenix -->
  <g filter="url(#shadowSm)">
    <rect x="845" y="270" width="140" height="58" rx="7" fill="url(#boxGrad)" stroke="#f472b6" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="915" y="291" text-anchor="middle" fill="#f472b6" font-size="9" font-weight="600">Phoenix</text>
    <text x="915" y="306" text-anchor="middle" fill="#94a3b8" font-size="7.5">OpenTelemetry</text>
    <text x="915" y="320" text-anchor="middle" fill="#f472b6" font-size="7.5" font-weight="500">:6006</text>
  </g>

  <!-- ArXiv API -->
  <g filter="url(#shadowSm)">
    <rect x="845" y="340" width="140" height="40" rx="7" fill="url(#boxGrad)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="915" y="357" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">ArXiv</text>
    <text x="915" y="372" text-anchor="middle" fill="#94a3b8" font-size="7">Academic papers</text>
  </g>

  <!-- USPTO Patent API -->
  <g filter="url(#shadowSm)">
    <rect x="845" y="392" width="140" height="40" rx="7" fill="url(#boxGrad)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="915" y="409" text-anchor="middle" fill="#22d3ee" font-size="9" font-weight="600">USPTO</text>
    <text x="915" y="424" text-anchor="middle" fill="#94a3b8" font-size="7">Patents + abstracts</text>
  </g>

  <!-- HackerNews API -->
  <g filter="url(#shadowSm)">
    <rect x="845" y="444" width="140" height="40" rx="7" fill="url(#boxGrad)" stroke="#c4b5fd" stroke-width="1" stroke-dasharray="5,3"/>
    <text x="915" y="461" text-anchor="middle" fill="#c4b5fd" font-size="9" font-weight="600">HackerNews</text>
    <text x="915" y="476" text-anchor="middle" fill="#94a3b8" font-size="7">Community sentiment</text>
  </g>

  <!-- Dashed lines from hub right edge to external services -->
  <line x1="820" y1="224" x2="845" y2="224" stroke="#38bdf8" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="820" y1="299" x2="845" y2="299" stroke="#f472b6" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="820" y1="360" x2="845" y2="360" stroke="#a78bfa" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="820" y1="412" x2="845" y2="412" stroke="#22d3ee" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="820" y1="464" x2="845" y2="464" stroke="#c4b5fd" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ================================================================ -->
  <!-- TIER 3: User (y=440..490)                                        -->
  <!-- ================================================================ -->
  <g filter="url(#shadow)">
    <rect x="415" y="440" width="150" height="50" rx="7" fill="url(#boxGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <text x="490" y="462" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">User</text>
    <text x="490" y="477" text-anchor="middle" fill="#94a3b8" font-size="8">Browser / CLI</text>
  </g>

  <!-- User to Hub: arrow up -->
  <line x1="490" y1="440" x2="490" y2="402" stroke="#e2e8f0" stroke-width="1" opacity="0.5"/>
  <polygon points="490,404 486,411 494,411" fill="#e2e8f0" opacity="0.5"/>
  <text x="500" y="425" fill="#64748b" font-size="7">:8420</text>

  <!-- ================================================================ -->
  <!-- LEGEND (y=515..555)                                              -->
  <!-- ================================================================ -->
  <g transform="translate(200, 520)">
    <text x="0" y="0" fill="#64748b" font-size="8" font-weight="600" letter-spacing="0.5">LEGEND</text>

    <!-- Row 1 -->
    <line x1="0" y1="16" x2="22" y2="16" stroke="#94a3b8" stroke-width="1"/>
    <text x="28" y="19" fill="#64748b" font-size="7">Internal connection</text>

    <line x1="150" y1="16" x2="172" y2="16" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="178" y="19" fill="#64748b" font-size="7">External API call</text>

    <rect x="310" y="10" width="10" height="10" rx="2" fill="none" stroke="#22c55e" stroke-width="1"/>
    <text x="326" y="19" fill="#64748b" font-size="7">NemoClaw sandbox</text>

    <!-- Row 2 -->
    <rect x="0" y="28" width="10" height="10" rx="2" fill="none" stroke="#0ea5e9" stroke-width="1"/>
    <text x="16" y="37" fill="#64748b" font-size="7">NCMS components</text>

    <rect x="150" y="28" width="10" height="10" rx="2" fill="none" stroke="#76b900" stroke-width="1"/>
    <text x="166" y="37" fill="#64748b" font-size="7">NVIDIA infrastructure</text>

    <rect x="310" y="28" width="10" height="10" rx="2" fill="none" stroke="#f472b6" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="326" y="37" fill="#64748b" font-size="7">External services</text>
  </g>
</svg>
