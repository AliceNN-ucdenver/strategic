<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="liveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="sleepGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="dreamGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="wakeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="ds2" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <marker id="arrowGreenM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrowAmberM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
    <marker id="arrowCyanM" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#06b6d4"/>
    </marker>
  </defs>

  <rect width="960" height="400" rx="12" fill="#0f172a"/>

  <text x="480" y="32" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700">Agent Sleep / Wake / Dream Cycle</text>
  <text x="480" y="50" text-anchor="middle" fill="#94a3b8" font-size="11">Knowledge persists, dreams consolidate, surrogates respond while agents sleep</text>

  <!-- Timeline bar -->
  <rect x="40" y="70" width="880" height="3" rx="1.5" fill="#334155"/>

  <!-- Phase 1: Online -->
  <g filter="url(#ds2)">
    <rect x="40" y="90" width="155" height="130" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <rect x="40" y="90" width="155" height="28" rx="10" fill="url(#liveGrad)"/>
    <rect x="40" y="110" width="155" height="8" fill="url(#liveGrad)"/>
    <text x="117" y="109" text-anchor="middle" fill="white" font-size="12" font-weight="600">1. Online</text>
    <circle cx="178" cy="100" r="5" fill="white" opacity="0.9"/>
    <text x="117" y="140" text-anchor="middle" fill="#86efac" font-size="10" font-weight="500">LIVE Mode</text>
    <text x="117" y="160" text-anchor="middle" fill="#94a3b8" font-size="9">Stores knowledge</text>
    <text x="117" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">Responds to asks</text>
    <text x="117" y="190" text-anchor="middle" fill="#94a3b8" font-size="9">Processes announcements</text>
  </g>
  <circle cx="117" cy="71" r="5" fill="#22c55e"/>

  <!-- Arrow 1->2 -->
  <path d="M 195 155 Q 210 155 218 155" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreenM)"/>

  <!-- Phase 2: Sleep -->
  <g filter="url(#ds2)">
    <rect x="225" y="90" width="155" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
    <rect x="225" y="90" width="155" height="28" rx="10" fill="url(#sleepGrad)"/>
    <rect x="225" y="110" width="155" height="8" fill="url(#sleepGrad)"/>
    <text x="302" y="109" text-anchor="middle" fill="white" font-size="12" font-weight="600">2. Sleep</text>
    <text x="302" y="140" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">Publish Snapshot</text>
    <text x="302" y="160" text-anchor="middle" fill="#94a3b8" font-size="9">Collects working knowledge</text>
    <text x="302" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">Persists to SQLite</text>
    <text x="302" y="190" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="500">Triggers dream cycle</text>
    <!-- Zzz -->
    <text x="360" y="100" fill="#f59e0b" font-size="10" opacity="0.5">z</text>
    <text x="367" y="95" fill="#f59e0b" font-size="12" opacity="0.7">z</text>
    <text x="373" y="88" fill="#f59e0b" font-size="14" opacity="0.9">z</text>
  </g>
  <circle cx="302" cy="71" r="5" fill="#f59e0b"/>

  <!-- Arrow 2->3 -->
  <path d="M 380 155 Q 395 155 403 155" stroke="#06b6d4" stroke-width="2" fill="none" marker-end="url(#arrowCyanM)"/>

  <!-- Phase 3: Dream Cycle (NEW) -->
  <g filter="url(#ds2)">
    <rect x="410" y="90" width="155" height="130" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
    <rect x="410" y="90" width="155" height="28" rx="10" fill="url(#dreamGrad)"/>
    <rect x="410" y="110" width="155" height="8" fill="url(#dreamGrad)"/>
    <text x="487" y="109" text-anchor="middle" fill="white" font-size="12" font-weight="600">3. Dream Cycle</text>

    <!-- Moon + stars -->
    <text x="545" y="100" fill="#67e8f9" font-size="14" opacity="0.8">&#9790;</text>
    <text x="540" y="90" fill="#67e8f9" font-size="6" opacity="0.5">&#10022;</text>
    <text x="553" y="93" fill="#67e8f9" font-size="5" opacity="0.4">&#10022;</text>

    <text x="430" y="140" fill="#67e8f9" font-size="9" font-weight="500">&#8635; Rehearsal</text>
    <text x="430" y="153" fill="#94a3b8" font-size="7">  Replay important memories</text>
    <text x="430" y="168" fill="#67e8f9" font-size="9" font-weight="500">&#8652; PMI Learning</text>
    <text x="430" y="181" fill="#94a3b8" font-size="7">  Entity co-access weights</text>
    <text x="430" y="196" fill="#67e8f9" font-size="9" font-weight="500">&#8599; Importance Drift</text>
    <text x="430" y="209" fill="#94a3b8" font-size="7">  Access trend adjustment</text>
  </g>
  <circle cx="487" cy="71" r="5" fill="#06b6d4"/>

  <!-- Arrow 3->4 -->
  <path d="M 565 155 Q 580 155 588 155" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arrowAmberM)"/>

  <!-- Phase 4: Surrogate -->
  <g filter="url(#ds2)">
    <rect x="595" y="90" width="155" height="130" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2" stroke-dasharray="6,3"/>
    <rect x="595" y="90" width="155" height="28" rx="10" fill="#92400e" opacity="0.9"/>
    <rect x="595" y="110" width="155" height="8" fill="#92400e" opacity="0.9"/>
    <text x="672" y="109" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">4. Surrogate</text>
    <text x="672" y="140" text-anchor="middle" fill="#fcd34d" font-size="10" font-weight="500">WARM Mode Response</text>
    <text x="672" y="160" text-anchor="middle" fill="#94a3b8" font-size="9">Another agent asks</text>
    <text x="672" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">Matches snapshot entries</text>
    <text x="672" y="190" text-anchor="middle" fill="#94a3b8" font-size="9">Confidence discounted 0.8x</text>
  </g>
  <circle cx="672" cy="71" r="5" fill="#f59e0b" stroke="#f59e0b" stroke-width="1" fill-opacity="0.4"/>

  <!-- Arrow 4->5 -->
  <path d="M 750 155 Q 765 155 773 155" stroke="#22c55e" stroke-width="2" fill="none" marker-end="url(#arrowGreenM)"/>

  <!-- Phase 5: Wake -->
  <g filter="url(#ds2)">
    <rect x="780" y="90" width="155" height="130" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
    <rect x="780" y="90" width="155" height="28" rx="10" fill="url(#liveGrad)"/>
    <rect x="780" y="110" width="155" height="8" fill="url(#liveGrad)"/>
    <text x="857" y="109" text-anchor="middle" fill="white" font-size="12" font-weight="600">5. Wake</text>
    <text x="857" y="140" text-anchor="middle" fill="#86efac" font-size="10" font-weight="500">Back to LIVE</text>
    <text x="857" y="160" text-anchor="middle" fill="#94a3b8" font-size="9">Restores from snapshot</text>
    <text x="857" y="175" text-anchor="middle" fill="#94a3b8" font-size="9">Re-registers domains</text>
    <text x="857" y="190" text-anchor="middle" fill="#94a3b8" font-size="9">Full confidence again</text>
  </g>
  <circle cx="857" cy="71" r="5" fill="#22c55e"/>

  <!-- Bottom scenario cards -->
  <rect x="40" y="250" width="420" height="130" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="60" y="275" fill="#e2e8f0" font-size="12" font-weight="600">Use Case: Late Night Development</text>
  <text x="60" y="297" fill="#94a3b8" font-size="10">The API team works 9-5. Their agent goes to sleep at EOD.</text>
  <text x="60" y="315" fill="#94a3b8" font-size="10">While sleeping, dream cycles strengthen key API memories.</text>
  <text x="60" y="333" fill="#94a3b8" font-size="10">At 2 AM, the frontend dev asks about an endpoint spec.</text>
  <text x="60" y="351" fill="#fbbf24" font-size="10" font-weight="500">NCMS responds from the snapshot. No one waits until morning.</text>
  <text x="60" y="370" fill="#64748b" font-size="9">Response marked as "warm" so the developer knows it's from cache.</text>

  <rect x="480" y="250" width="455" height="130" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="500" y="275" fill="#e2e8f0" font-size="12" font-weight="600">Response Mode Comparison</text>
  <!-- Live bar -->
  <rect x="500" y="290" width="200" height="22" rx="4" fill="#22c55e" opacity="0.8"/>
  <text x="600" y="305" text-anchor="middle" fill="white" font-size="10" font-weight="600">LIVE  conf: 0.90</text>
  <text x="715" y="305" fill="#94a3b8" font-size="9">Direct from agent</text>

  <!-- Warm bar -->
  <rect x="500" y="320" width="160" height="22" rx="4" fill="#f59e0b" opacity="0.8"/>
  <text x="580" y="335" text-anchor="middle" fill="white" font-size="10" font-weight="600">WARM  conf: 0.72</text>
  <text x="675" y="335" fill="#94a3b8" font-size="9">Snapshot (0.8x discount)</text>

  <!-- Cold bar -->
  <rect x="500" y="350" width="100" height="16" rx="4" fill="#64748b" opacity="0.6"/>
  <text x="550" y="362" text-anchor="middle" fill="white" font-size="9" font-weight="500">COLD</text>
  <text x="615" y="362" fill="#64748b" font-size="9">Expired / no match</text>
</svg>
